name: ci

on:
  push:
  pull_request:

jobs:
  native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Prepare wrapper
        shell: bash
        run: chmod +x mvnw
      - name: Style and static checks
        shell: bash
        run: ./mvnw -q spotless:check checkstyle:check spotbugs:check
      - name: Test and package
        shell: bash
        run: ./mvnw -q test package

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t java-stakeholder .
      - name: Smoke test
        run: docker run --rm java-stakeholder --list-values
